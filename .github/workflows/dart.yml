name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

jobs:
  swiftpm:
    if: ${{ github.event_name != 'pull_request' || (github.actor == github.repository_owner && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
    - name: Prepare self-hosted Apple toolchain
      env:
        REQUIRED_XCODE_MAJOR: 26
        REQUIRED_XCODE_DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      run: bash .github/scripts/prepare_self_hosted_macos_ci.sh
    - name: Show toolchain state
      run: flutter doctor -v
    - name: Install dependencies
      run: flutter pub get
    - name: Run flutter analyze
      run: flutter analyze
    - name: Run tests
      run: flutter test --coverage
    - name: Publish dry run
      run: flutter pub publish --dry-run
    - name: Install example dependencies
      working-directory: ./example
      run: flutter pub get
    - name: Build example with Swift Package Manager
      working-directory: ./example
      run: flutter build ios --debug --no-codesign
    - name: Build release example with Swift Package Manager
      working-directory: ./example
      run: flutter build ios --release --no-codesign
    - name: Boot iOS simulator
      run: |
        set -eo pipefail
        xcrun simctl shutdown all || true
        xcrun simctl boot "$IOS_SIMULATOR_UDID" || true
        xcrun simctl bootstatus "$IOS_SIMULATOR_UDID" -b
    - name: Run example integration tests
      working-directory: ./example
      run: flutter test integration_test -d "$IOS_SIMULATOR_UDID"
